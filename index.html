<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <title>Benjamin Wang</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #fafafa;
            color: #222;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
        }

        a { color: inherit; text-decoration: none; }

        /* Layout */
        .container {
            max-width: 480px;
            margin: 0 auto 0 8%;
            padding: 0 2rem;
        }

        /* Header */
        header {
            padding: 4rem 0 2rem;
        }

        .name {
            font-size: 1.1rem;
            font-weight: normal;
            letter-spacing: 0.15em;
            color: #111;
        }

        .tagline {
            margin-top: 0.4rem;
            color: #555;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        /* Nav */
        nav {
            padding: 1.8rem 0;
            display: flex;
            gap: 2rem;
        }

        nav a {
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #555;
            transition: color 0.15s;
        }

        nav a:hover { color: #e0e0e0; }

        /* Main */
        main {
            padding: 3rem 0;
        }

        .section-label {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 1.5rem;
        }

        /* Recent posts/entries list */
        .entry-list {
            list-style: none;
            margin-bottom: 3rem;
        }

        .entry-list li {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
            gap: 1rem;
        }

        .entry-list a {
            color: #333;
            transition: color 0.15s;
        }

        .entry-list a:hover { color: #111; }

        .entry-date {
            color: #999;
            font-size: 0.8rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Footer */
        footer {
            padding: 2rem 0;
            display: flex;
            gap: 1.5rem;
            color: #333;
            font-size: 0.8rem;
            align-items: center;
        }
        footer a { display: flex; align-items: center; gap: 0.4rem; }
        footer svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        footer a { color: #444; transition: color 0.15s; }
        footer a:hover { color: #111; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="name">benjamin wang</div>
            <div class="tagline">
                // undergraduate student @ dartmouth college<br>
                // major: mathematics & computer science<br>
                // interests: ml research, interpretability,<br>
                // human-centric ai
            </div>
        </header>

        <nav>
            <a href="about.html">About</a>

        <main>
            <p class="section-label">Recent</p>
            <ul class="entry-list">
                <li>
                    <a href="#"></a>
                    <span class="entry-date">—</span>
                </li>

    </div>
</body>
</html>
