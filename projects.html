<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Benjamin Wang - Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-weight: 300;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 2rem;
        }

        .name {
            color: #000;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-left: 7rem;
        }

        .name a {
            text-decoration: none;
            color: #000;
        }

        .nav-header {
            display: flex;
            gap: 2rem;
            margin-right: 6rem;
        }

        .nav-header a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: 0.02em;
            transition: opacity 0.3s ease;
        }

        .nav-header a:hover {
            opacity: 0.7;
        }

        /* Dashboard */
        .dashboard {
            margin: 4rem 8rem;
            font-family: 'Courier New', 'Consolas', monospace;
        }

        .dashboard-title {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.4);
            margin-bottom: 1.5rem;
        }

        .dashboard-title .cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: #000;
            margin-left: 4px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .dashboard-grid {
            display: flex;
            gap: 2rem;
        }

        .dash-box {
            flex: 1;
            border: 1px solid rgba(0,0,0,0.15);
            padding: 1.5rem;
            position: relative;
        }

        .dash-box::before {
            content: attr(data-label);
            position: absolute;
            top: -0.5rem;
            left: 1rem;
            background: #fff;
            padding: 0 0.5rem;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.35);
        }

        .dash-box ul {
            list-style: none;
            padding: 0;
        }

        .dash-box li {
            font-size: 0.85rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            letter-spacing: 0.02em;
        }

        .dash-box li:last-child {
            border-bottom: none;
        }

        .dash-box li .status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            border: 1px solid #000;
            flex-shrink: 0;
            margin-top: 0.5rem;
        }

        .dash-box li .status.active {
            background: #000;
        }

        .dash-box li .meta {
            margin-left: auto;
            font-size: 0.65rem;
            color: rgba(0,0,0,0.3);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="name"><a href="index.html">Benjamin Wang</a></div>
        <div class="nav-header">
            <a href="treeofthoughts.html">Tree of Thoughts</a>
            <a href="research.html">Research</a>
            <a href="projects.html">Projects</a>
        </div>
    </div>

    <div class="dashboard">
        <div class="dashboard-grid">
            <div class="dash-box" data-label="Active">
                <ul>
                    <li><span class="status active"></span>Coming soon<span class="meta">—</span></li>
                </ul>
            </div>
            <div class="dash-box" data-label="Completed">
                <ul>
                    <li><span class="status"></span>Coming soon<span class="meta">—</span></li>
                </ul>
            </div>
            <div class="dash-box" data-label="Future works">
                <ul>
                    <li><span class="status"></span>Discovering combinatorial properties through mechanistic interpretability of reinforcement learning setwithfriends agent<span class="meta">—</span></li>
                    <li><span class="status"></span>Proving that Monday is even and Tuesday is odd with neural networks<span class="meta">—</span></li>
                </ul>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
