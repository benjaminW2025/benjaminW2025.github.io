<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <title>Blog — Benjamin Wang</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fafafa; color: #222; font-family: 'IBM Plex Mono', monospace; font-size: 14px; line-height: 1.6; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }
        .container { max-width: 720px; margin: 0 auto 0 8%; padding: 0 2rem; }
        header { padding: 4rem 0 2rem; border-bottom: 1px solid #e8e8e8; display: flex; justify-content: space-between; align-items: baseline; }
        .name { font-size: 1.1rem; letter-spacing: 0.15em; color: #111; }
        nav { padding: 1.8rem 0; border-bottom: 1px solid #e8e8e8; display: flex; gap: 2rem; }
        nav a { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: #777; transition: color 0.15s; }
        nav a:hover, nav a.active { color: #111; }
        main { padding: 3rem 0; }
        .page-title { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: #666; margin-bottom: 1.5rem; }

        /* Filters */
        .filters { display: flex; gap: 1.2rem; margin-bottom: 2rem; }
        .filter-btn {
            background: none; border: none; cursor: pointer;
            font-family: inherit; font-size: 0.75rem;
            letter-spacing: 0.2em; text-transform: uppercase;
            color: #444; transition: color 0.15s; padding: 0;
        }
        .filter-btn:hover { color: #999; }
        .filter-btn.active { color: #111; }

        /* Entry list */
        .entry-list { list-style: none; }
        .entry-list li {
            display: flex; justify-content: space-between;
            align-items: baseline; padding: 0.75rem 0;
            border-bottom: 1px solid #eee; gap: 1rem;
        }
        .entry-list li.hidden { display: none; }
        .entry-list a { color: #333; transition: color 0.15s; }
        .entry-list a:hover { color: #111; }
        .entry-meta { display: flex; align-items: baseline; gap: 1rem; flex-shrink: 0; }
        .entry-tag { font-size: 0.7rem; letter-spacing: 0.1em; color: #333; text-transform: uppercase; }
        .entry-date { color: #999; font-size: 0.8rem; white-space: nowrap; }
        footer { padding: 2rem 0; display: flex; gap: 1.5rem; font-size: 0.8rem; align-items: center; }
        footer a { display: flex; align-items: center; gap: 0.4rem; color: #777; transition: color 0.15s; }
        footer a:hover { color: #111; }
        footer svg { width: 13px; height: 13px; }
        footer .icon-mail { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        footer .icon-github { fill: currentColor; stroke: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="name">Benjamin Wang</a>
        </header>
        <nav>
            <a href="about.html">About</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="notes.html">Notes</a>
        </nav>
        <main>
            <p class="page-title">Blog</p>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">all</button>
                <button class="filter-btn" data-filter="project">projects</button>
                <button class="filter-btn" data-filter="writing">writing</button>
            </div>
            <ul class="entry-list">
                <!-- duplicate this for each post:
                <li data-tag="project">
                    <a href="blog/post-name.html">Post title</a>
                    <div class="entry-meta">
                        <span class="entry-tag">project</span>
                        <span class="entry-date">2026-04-07</span>
                    </div>
                </li>
                -->
                <li data-tag="project">
                    <a href="blog/gpt2-greater-than.html">Interpreting the greater than capability in GPT-2 Small</a>
                    <div class="entry-meta">
                        <span class="entry-tag">project</span>
                        <span class="entry-date">2026-04-08</span>
                    </div>
                </li>
            </ul>
        </main>

        <script>
            const btns = document.querySelectorAll('.filter-btn');
            const items = document.querySelectorAll('.entry-list li');

            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const filter = btn.dataset.filter;
                    items.forEach(item => {
                        item.classList.toggle('hidden', filter !== 'all' && item.dataset.tag !== filter);
                    });
                });
            });
        </script>
        <footer>
            <a href="https://github.com/benjaminw2025" target="_blank">
                <svg class="icon-github" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
                github
            </a>
            <a href="mailto:benjaminwang2025@gmail.com">
                <svg class="icon-mail" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
                email
            </a>
        </footer>
    </div>
</body>
</html>
